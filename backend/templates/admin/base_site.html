{% extends "admin/base.html" %}

{% block extrahead %}
{{ block.super }}
<style>
  /* ── RTL base ─────────────────────────────────────────── */
  html, body { direction: rtl; }

  /* Sidebar / nav */
  #nav-sidebar { right: 0; left: auto; border-left: 1px solid var(--hairline-color); border-right: none; }
  .toggle-nav-sidebar { margin-left: 0; margin-right: auto; }
  #main { padding-right: 0; }
  #nav-sidebar + #main { padding-right: var(--nav-sidebar-width); padding-left: 0; }

  /* Breadcrumbs */
  div.breadcrumbs { text-align: right; }

  /* Content headers */
  #content-main, #content-related { text-align: right; }

  /* Fieldsets */
  .form-row label { text-align: right; }
  fieldset .form-row { direction: rtl; }

  /* Tables */
  table thead th { text-align: right; }
  table td, table th { text-align: right; }
  .results th a, .results th { text-align: right; }

  /* Action row / submit buttons */
  .submit-row { text-align: left; }

  /* Filters sidebar */
  #changelist-filter { float: left; clear: left; margin-right: 20px; margin-left: 10px; }
  #changelist-filter h2 { border-top: none; border-bottom: 1px solid var(--hairline-color); }
  #changelist { margin-left: 10px; margin-right: 0; }

  /* Inline stacked / tabular */
  .inline-group .tabular .original { direction: rtl; }
  .inline-related .module td, .inline-related .module th { text-align: right; }

  /* Paginator */
  .paginator { text-align: right; direction: rtl; }

  /* Search */
  #toolbar { direction: rtl; }
  #searchbar { direction: rtl; text-align: right; }

  /* Object tools */
  ul.object-tools { float: left; }

  /* Help text */
  .help { direction: rtl; }

  /* Inline color preview swatch */
  .color-swatch-preview {
    display: inline-block;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    border: 1px solid #ccc;
    vertical-align: middle;
  }

  /* ── Mobile responsive for orders list & detail ──────── */
  @media (max-width: 767px) {
    /* Make the changelist table scroll horizontally instead of breaking layout */
    #changelist .results { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    #changelist table { min-width: 600px; }

    /* Shrink the nav sidebar away on mobile */
    #nav-sidebar { display: none; }
    #nav-sidebar + #main { padding-right: 0; }

    /* Status dropdown in list_editable — full width on mobile */
    #changelist table select { width: 100%; min-width: 110px; font-size: 0.82rem; }

    /* Order detail fieldsets — stack fields vertically */
    .form-row { flex-direction: column; }
    fieldset .form-row > .field-box { width: 100% !important; }

    /* Inline tabular (order items) — horizontal scroll */
    .inline-group .tabular { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .inline-group .tabular table { min-width: 560px; }

    /* Breadcrumbs — smaller text */
    div.breadcrumbs { font-size: 0.8rem; padding: 6px 12px; }

    /* Content area padding */
    #content { padding: 8px 10px; }

    /* Object tools (History, etc.) */
    ul.object-tools { float: none; margin-bottom: 8px; }
    ul.object-tools li { display: inline-block; margin-left: 4px; }

    /* Submit row buttons — stack on very small screens */
    .submit-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-start; }
    .submit-row input, .submit-row a.deletelink { width: auto; }

    /* Header site name */
    #site-name a { font-size: 1rem; }

    /* Filters sidebar — show inline below table on mobile */
    #changelist-filter { float: none; clear: both; margin: 10px 0 0; width: 100%; }
  }
</style>
{% endblock %}

{% block branding %}
<div id="site-name">
  <a href="{% url 'admin:index' %}">لوحة التحكم</a>
</div>
{% endblock %}
