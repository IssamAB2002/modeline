version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=modeline_db
      - POSTGRES_USER=modeline_user
      - POSTGRES_PASSWORD=modeline_password
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env.local
    depends_on:
      - db
      - redis

  # celery:
  #   build: .
  #   command: celery -A backend worker -l info
  #   volumes:
  #     - .:/app
  #   env_file: .env.local
  #   depends_on:
  #     - db
  #     - redis

volumes:
  postgres_data:
